<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薪火护遗 - 红色文化遗址保护平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- 头部 -->
    <header>
        <div class="header-content">
            <h1><i class="fas fa-monument"></i> 薪火护遗</h1>
            <p class="subtitle">红色文化遗址保护与传承平台</p>
        </div>
    </header>

    <!-- 导航栏 -->
    <nav>
        <div class="nav-container">
            <div class="nav-logo">
                <span style="color: white; font-weight: bold;"><i class="fas fa-landmark"></i> 红色记忆</span>
            </div>
            <div class="nav-links">
                <a href="#" class="active"><i class="fas fa-home"></i> 首页</a>
                <a href="#"><i class="fas fa-map-marked-alt"></i> 遗址地图</a>
                <a href="#"><i class="fas fa-newspaper"></i> 保护动态</a>
                <a href="#"><i class="fas fa-info-circle"></i> 关于我们</a>
            </div>
        </div>
    </nav>

    <!-- 城市筛选 -->
    <section class="city-filter">
        <div class="filter-container">
            <h3 class="filter-title"><i class="fas fa-filter"></i> 选择城市</h3>
            <div class="city-buttons" id="city-buttons">
                <button class="city-btn active" data-city="all">全部城市</button>
                <!-- 城市按钮将通过JavaScript动态生成 -->
            </div>
        </div>
    </section>

    <!-- 搜索框 -->
    <section class="search-section">
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="搜索遗址名称、地点或关键词...">
                <button id="search-btn">搜索</button>
            </div>
        </div>
    </section>

    <!-- 内容区域 -->
    <section class="content">
        <div class="content-header">
            <h2 class="section-title"><i class="fas fa-archway"></i> 红色文化遗址</h2>
            <div class="result-count" id="result-count">正在加载...</div>
        </div>
        <div class="heritage-grid" id="heritage-container">
            <!-- 遗址卡片将通过JavaScript动态生成 -->
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>正在加载数据...</p>
            </div>
        </div>
    </section>

    <!-- 模态框 -->
    <div class="modal" id="heritage-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">遗址名称</h2>
                <span class="close-modal" id="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modal-img" class="modal-img" src="" alt="遗址图片">
                </div>
                <div class="modal-section">
                    <h3 class="modal-section-title"><i class="fas fa-info-circle"></i> 基本概况</h3>
                    <p id="modal-basic-info"></p>
                </div>
                <div class="modal-section">
                    <h3 class="modal-section-title"><i class="fas fa-history"></i> 历史背景</h3>
                    <p id="modal-history"></p>
                </div>
                <div class="modal-section">
                    <h3 class="modal-section-title"><i class="fas fa-star"></i> 特色与价值</h3>
                    <p id="modal-features"></p>
                </div>
                <div class="modal-section">
                    <h3 class="modal-section-title"><i class="fas fa-map-marker-alt"></i> 地址</h3>
                    <p id="modal-address"></p>
                </div>
                <div class="modal-section">
                    <h3 class="modal-section-title"><i class="fas fa-utensils"></i> 当地特产</h3>
                    <div class="specialty-list" id="modal-specialty"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="footer-content">
            <p><i class="fas fa-fire"></i> 薪火护遗 - 传承红色基因，守护历史记忆</p>
            <p>© 2023 红色文化遗址保护平台 版权所有</p>
            <div class="footer-links">
                <a href="#"><i class="fas fa-envelope"></i> 联系我们</a>
                <a href="#"><i class="fas fa-shield-alt"></i> 隐私政策</a>
                <a href="#"><i class="fas fa-file-alt"></i> 使用条款</a>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
